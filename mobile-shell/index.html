<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>GoodHabits</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #060d1c;
        color: #e2e8f0;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(59, 130, 246, 0.18), transparent 30%),
          linear-gradient(180deg, #060d1c 0%, #020617 100%);
      }

      main {
        width: min(28rem, calc(100vw - 2rem));
        padding: 2rem;
        border: 1px solid rgba(59, 130, 246, 0.2);
        border-radius: 1.5rem;
        background: rgba(15, 23, 42, 0.88);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.75rem;
      }

      p {
        margin: 0 0 1rem;
        line-height: 1.5;
        color: #cbd5e1;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GoodHabits iOS Shell</h1>
      <p>
        This native app expects a hosted Habit Tracker web origin through
        <code>CAPACITOR_SERVER_URL</code>.
      </p>
      <p>
        Set that value, run <code>npx cap sync ios</code>, then open the iOS
        project in Xcode.
      </p>
    </main>
  </body>
</html>
